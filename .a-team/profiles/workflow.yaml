id: workflow
version: 1
description: Requirements for stateful, multi-actor workflows.
required_sections:
  - actors
  - initial_state
  - states
  - transitions
  - triggers
  - permissions
  - error_paths
  - cancellation_path
  - retry_and_duplicate_action_behavior
  - audit_and_notification_expectations
ready_checks:
  - actors_and_permissions_defined
  - state_transitions_are_complete
  - failure_and_recovery_paths_defined
done_checks:
  - happy_path_verified
  - failure_and_cancellation_paths_verified
  - authorization_and_idempotency_verified
