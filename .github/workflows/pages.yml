name: GitHub Pages

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  site-build:
    name: site-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build:site
      - run: npx playwright install --with-deps chromium
      - run: npm run test:site
      - name: Main regression gate
        if: github.event_name != 'pull_request'
        run: |
          npm run typecheck
          npm test
      - uses: actions/configure-pages@v5
        if: github.repository == 'arpadtamasi/a-team' && github.ref == 'refs/heads/main'
      - uses: actions/upload-pages-artifact@v4
        if: github.repository == 'arpadtamasi/a-team' && github.ref == 'refs/heads/main'
        with:
          path: site-dist

  pages-deploy:
    name: pages-deploy
    if: github.repository == 'arpadtamasi/a-team' && github.ref == 'refs/heads/main'
    needs: site-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify live URL
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          for ATTEMPT in {1..12}; do
            if curl --fail --silent --show-error --location "${PAGE_URL}" >/dev/null; then
              exit 0
            fi
            echo "Pages URL is not ready yet (attempt ${ATTEMPT}/12)."
            sleep 5
          done
          exit 1
