id: bug
version: 1
description: Requirements for diagnosing and correcting observable defects.
required_sections:
  - actual_behavior
  - expected_behavior
  - reproduction_steps
  - environment
  - frequency
  - impact
  - regression_test_expectation
ready_checks:
  - defect_is_reproducible_or_evidence_explains_why_not
  - expected_behavior_is_unambiguous
  - affected_environment_is_identified
done_checks:
  - expected_behavior_verified
  - regression_test_added_or_exception_recorded
  - affected_environment_rechecked
