id: metric
version: 1
description: Requirements for defining or implementing decision-supporting metrics.
required_sections:
  - supported_decision
  - semantic_definition
  - numerator_and_denominator
  - unit_of_analysis
  - time_window
  - segmentation
  - source_events_or_tables
  - exclusions
  - validation_cases
ready_checks:
  - metric_semantics_are_unambiguous
  - source_data_is_identified
  - edge_cases_and_exclusions_defined
done_checks:
  - validation_cases_pass
  - source_data_reconciled
  - segmentation_and_time_boundaries_verified
