id: discovery
version: 1
description: Requirements for bounded investigation that supports a decision.
required_sections:
  - supported_decision
  - research_question
  - hypotheses
  - method
  - time_or_depth_limit
  - expected_output
  - decision_criterion
ready_checks:
  - decision_owner_and_question_are_clear
  - investigation_is_bounded
  - evidence_method_is_defined
done_checks:
  - expected_output_delivered
  - evidence_and_uncertainty_recorded
  - decision_criterion_applied
