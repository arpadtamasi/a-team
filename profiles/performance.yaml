id: performance
version: 1
description: Requirements for work with measurable performance outcomes.
required_sections:
  - measured_baseline
  - target_value
  - measurement_environment
  - workload_and_data_volume
  - aggregation_or_percentile
  - permitted_variance
  - regression_limits
  - before_after_verification
ready_checks:
  - baseline_is_reproducible
  - target_and_units_are_defined
  - representative_workload_is_defined
done_checks:
  - before_after_measurements_recorded
  - target_met_within_permitted_variance
  - regression_limits_verified
